<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Meeting to action flow diagram (monochrome + blue)">
  <defs>
    <style>
      .t { font-family: -apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Roboto,Arial,sans-serif; }
      .box { fill:#fff; stroke: rgba(17,24,39,0.14); stroke-width:2; }
      .title { fill:#111827; font-weight:800; }
      .muted { fill:#4b5563; }
      .pill { fill: rgba(31,78,216,0.08); stroke: rgba(31,78,216,0.28); }
      .arrow { stroke: rgba(17,24,39,0.30); stroke-width:3; marker-end:url(#m); }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="rgba(17,24,39,0.30)" />
    </marker>
  </defs>

  <rect x="28" y="28" width="1144" height="364" rx="18" class="box"/>
  <text class="t title" x="60" y="80" font-size="22">會議 → 決策 → 待辦：AI 副駕的 3 步工作流</text>

  <!-- step 1 -->
  <rect x="80" y="130" width="320" height="200" rx="16" class="box"/>
  <rect x="110" y="160" width="260" height="40" rx="20" class="pill"/>
  <text class="t title" x="125" y="186" font-size="16">Step 1：輸出成「決策表」</text>
  <text class="t muted" x="110" y="230" font-size="14">Decision / Reason / Owner</text>
  <text class="t muted" x="110" y="255" font-size="14">Deadline / Risk</text>
  <text class="t muted" x="110" y="295" font-size="13">重點：不是逐字稿，也不是摘要。</text>

  <!-- arrow 1 -->
  <line x1="420" y1="230" x2="510" y2="230" class="arrow"/>

  <!-- step 2 -->
  <rect x="520" y="130" width="320" height="200" rx="16" class="box"/>
  <rect x="550" y="160" width="260" height="40" rx="20" class="pill"/>
  <text class="t title" x="565" y="186" font-size="16">Step 2：丟進專案系統</text>
  <text class="t muted" x="550" y="230" font-size="14">Notion / Jira / Trello</text>
  <text class="t muted" x="550" y="255" font-size="14">讓 AI 拆解成可追蹤待辦</text>
  <text class="t muted" x="550" y="295" font-size="13">每條決策 → 一個任務。</text>

  <!-- arrow 2 -->
  <line x1="860" y1="230" x2="950" y2="230" class="arrow"/>

  <!-- step 3 -->
  <rect x="960" y="130" width="160" height="200" rx="16" class="box"/>
  <rect x="980" y="160" width="120" height="40" rx="20" class="pill"/>
  <text class="t title" x="990" y="186" font-size="16">Step 3</text>
  <text class="t muted" x="980" y="230" font-size="14">會議教練</text>
  <text class="t muted" x="980" y="255" font-size="13">離題 Top3</text>
  <text class="t muted" x="980" y="278" font-size="13">下次議程優化</text>
</svg>

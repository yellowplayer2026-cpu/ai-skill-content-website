title: AI Skill Content Website
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "/ai-skill-content-website" # the subpath of your site, e.g. /blog
url: "https://yellowplayer2026-cpu.github.io" # the base hostname & protocol for your site
twitter_username: jekyllrb
github_username: jekyll
permalink: /blog/:year/:month/:day/:slug.html
remote_theme: jekyll/minima

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-remote-theme


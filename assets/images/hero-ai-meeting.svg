<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="AI meeting copilot hero illustration (monochrome + blue)">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f5f7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="22%" r="70%">
      <stop offset="0" stop-color="#1f4ed8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1f4ed8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <style>
      .t { font-family: -apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Roboto,Arial,sans-serif; }
      .muted { fill: #4b5563; }
      .strong { fill: #111827; font-weight: 800; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- main card -->
  <g filter="url(#shadow)">
    <rect x="170" y="190" width="1260" height="520" rx="28" fill="#ffffff" stroke="rgba(17,24,39,0.12)"/>
  </g>

  <!-- laptop (clean, monochrome) -->
  <g>
    <rect x="340" y="420" width="520" height="260" rx="18" fill="#111827"/>
    <rect x="360" y="440" width="480" height="200" rx="12" fill="#0b1220"/>
    <rect x="460" y="685" width="280" height="18" rx="9" fill="#111827" opacity="0.60"/>

    <!-- on-screen decision table -->
    <g opacity="0.98">
      <rect x="385" y="470" width="430" height="150" rx="10" fill="#ffffff" stroke="rgba(17,24,39,0.10)"/>
      <rect x="385" y="470" width="430" height="34" rx="10" fill="#eef2ff"/>
      <text class="t strong" x="405" y="494" font-size="16">Decision / Owner / Deadline</text>
      <line x1="405" y1="525" x2="795" y2="525" stroke="rgba(17,24,39,0.12)"/>
      <line x1="405" y1="555" x2="795" y2="555" stroke="rgba(17,24,39,0.12)"/>
      <line x1="405" y1="585" x2="795" y2="585" stroke="rgba(17,24,39,0.12)"/>

      <circle cx="412" cy="540" r="5" fill="#1f4ed8"/>
      <circle cx="412" cy="570" r="5" fill="#1f4ed8"/>
      <circle cx="412" cy="600" r="5" fill="#1f4ed8"/>

      <rect x="430" y="533" width="250" height="12" rx="6" fill="#d1d5db"/>
      <rect x="430" y="563" width="290" height="12" rx="6" fill="#d1d5db"/>
      <rect x="430" y="593" width="210" height="12" rx="6" fill="#d1d5db"/>

      <rect x="690" y="533" width="110" height="12" rx="6" fill="#c7d2fe"/>
      <rect x="740" y="563" width="60" height="12" rx="6" fill="#c7d2fe"/>
      <rect x="670" y="593" width="130" height="12" rx="6" fill="#c7d2fe"/>
    </g>
  </g>

  <!-- people silhouettes (grey only) -->
  <g opacity="0.92">
    <circle cx="1040" cy="420" r="42" fill="#e5e7eb" stroke="rgba(17,24,39,0.10)"/>
    <rect x="1000" y="462" width="80" height="130" rx="22" fill="#6b7280"/>

    <circle cx="1180" cy="450" r="38" fill="#e5e7eb" stroke="rgba(17,24,39,0.10)"/>
    <rect x="1146" y="488" width="68" height="110" rx="20" fill="#9ca3af"/>

    <circle cx="1320" cy="420" r="42" fill="#e5e7eb" stroke="rgba(17,24,39,0.10)"/>
    <rect x="1280" y="462" width="80" height="130" rx="22" fill="#4b5563"/>
  </g>

  <!-- AI accent (single brand blue) -->
  <g>
    <path d="M1010 260 C1120 210, 1270 210, 1380 260 C1270 320, 1120 320, 1010 260 Z" fill="#1f4ed8" opacity="0.10"/>
    <path d="M1040 260 C1130 225, 1260 225, 1350 260 C1260 295, 1130 295, 1040 260 Z" fill="#1f4ed8" opacity="0.16"/>
    <circle cx="1195" cy="255" r="52" fill="#1f4ed8" opacity="0.10"/>
    <circle cx="1195" cy="255" r="26" fill="#1f4ed8" opacity="0.18"/>
    <circle cx="1195" cy="255" r="6" fill="#1f4ed8" opacity="0.92"/>

    <text class="t strong" x="1045" y="220" font-size="18">AI 會議副駕</text>
    <text class="t muted" x="1045" y="244" font-size="14">把摘要變成決策與待辦</text>
  </g>
</svg>
